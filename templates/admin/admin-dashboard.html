<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Sanggar Bunda Sari</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../static/css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar" id="sidebar">
<div class="sidebar-brand"><div class="logo-icon"><i class="bi bi-mortarboard-fill"></i></div><div class="brand-text"><span class="brand-name">Sanggar Bunda Sari</span><span class="brand-sub">Admin Panel</span></div></div>
<nav class="sidebar-nav" id="sidebarNav"></nav>
<div class="sidebar-footer"><div class="sidebar-user"><img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff&size=36" alt="A"><div><div class="user-name" id="sidebarUsername">Admin</div><div class="user-role">Administrator</div></div></div></div>
</aside>
<div class="main-wrapper">
<header class="top-header">
<div class="header-left"><button class="header-btn btn-sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button><div><h2 id="pageTitle">Dashboard</h2><div class="breadcrumb">Admin / <span id="breadcrumb">Overview</span></div></div></div>
<div class="header-right"><button class="header-btn" onclick="loadAllData()" title="Refresh"><i class="bi bi-arrow-clockwise"></i></button><button class="header-btn" id="notifBtn"><i class="bi bi-bell"></i><span class="notification-dot" id="notifDot" style="display:none"></span></button></div>
</header>
<div class="content-area" id="contentArea"></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>
<div class="confirm-overlay" id="confirmDialog"><div class="confirm-box"><i class="bi bi-exclamation-triangle-fill"></i><h4>Konfirmasi</h4><p id="confirmMsg">Yakin?</p><div class="confirm-actions"><button class="btn btn-outline" onclick="closeConfirm()">Batal</button><button class="btn btn-danger" onclick="confirmAction()"><i class="bi bi-trash3"></i> Hapus</button></div></div></div>
<div class="toast-container" id="toastContainer"></div>
<script src="../../static/js/admin-core.js"></script>
<script src="../../static/js/admin-pages.js"></script>
<script src="../../static/js/admin-modules.js"></script>
<script src="../../static/js/admin-cms.js"></script>
<script src="../../static/js/admin-app.js"></script>
</body>
</html>
