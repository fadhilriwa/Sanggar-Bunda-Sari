<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Sanggar Bunda Sari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        body {
            background-color: var(--bg-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }
        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
        }
        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .alert {
            display: none;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 position-relative overflow-hidden">
    
    <!-- Animated Background -->
    <div class="position-absolute top-0 start-0 w-100 h-100 z-n1" style="background: linear-gradient(135deg, var(--bg-body) 0%, #e0e7ff 100%);">
        <div class="position-absolute top-0 end-0 rounded-circle opacity-50 filter-blur-3xl animate-pulse" style="width: 600px; height: 600px; background: rgba(99, 102, 241, 0.2); transform: translate(20%, -20%);"></div>
        <div class="position-absolute bottom-0 start-0 rounded-circle opacity-50 filter-blur-3xl animate-pulse delay-1000" style="width: 500px; height: 500px; background: rgba(244, 63, 94, 0.15); transform: translate(-20%, 20%);"></div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-xl glass animate-slide-up">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-3 mb-3 shadow-lg" style="width: 56px; height: 56px;">
                                <i class="bi bi-shield-lock-fill fs-3"></i>
                            </div>
                            <h1 class="h3 fw-bolder mb-1">Admin Login</h1>
                            <p class="text-muted small">Masuk untuk mengelola Dashboard</p>
                        </div>

                        <div id="error-message" class="alert alert-danger border-0 d-none text-center small rounded-3 py-2"></div>

                        <form id="login-form" onsubmit="handleLogin(event)">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control bg-white border-0 shadow-sm" id="username" placeholder="Username" required autofocus style="height: 50px;">
                                <label for="username" class="text-muted small">Username</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control bg-white border-0 shadow-sm" id="password" placeholder="Password" required style="height: 50px;">
                                <label for="password" class="text-muted small">Password</label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-primary text-uppercase hover-lift" style="letter-spacing: 0.05em; font-size: 0.9rem;">
                                Masuk Dashboard
                            </button>
                        </form>
                    </div>
                    <div class="card-footer bg-transparent border-0 text-center pb-4">
                        <a href="./index.html" class="text-decoration-none text-muted small fw-semibold hover-text-primary">
                            <i class="bi bi-arrow-left me-1"></i> Kembali ke Website
                        </a>
                    </div>
                </div>
                <div class="text-center mt-3 animate-fade-in delay-200">
                     <small class="text-muted opacity-75">&copy; 2024 Sanggar Bunda Sari</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.classList.add('d-none');
            errorDiv.textContent = '';

            // Loading state
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Loading...';
            btn.disabled = true;

            try {
                // Determine API Path (Local vs Production)
                const apiPath = window.location.origin.includes('Xampp') ? '/sistem-pendaftaran-siswa/php/api/login.php' : '/php/api/login.php';
                
                // Fallback for relative path if needed
                const res = await fetch('../php/api/login.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password}),
                    credentials: 'include'
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '../admin/dashboard.html';
                } else {
                    errorDiv.textContent = data.message || 'Login gagal. Periksa username dan password.';
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                // For development demonstration ONLY if API fails
                if(username === 'admin' && password === 'admin') {
                     window.location.href = '../admin/dashboard.html';
                     return;
                }
                errorDiv.textContent = 'Gagal terhubung ke server.';
                errorDiv.classList.remove('d-none');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
